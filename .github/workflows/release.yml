name: Build & Release Pace Browser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: app

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Derive version from tag
        working-directory: app
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing version $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Patch electron-builder publish config
        working-directory: app
        shell: bash
        run: |
          sed -i "s|owner: .*|owner: ${{ github.repository_owner }}|" electron-builder.yml
          sed -i "s|repo: .*|repo: ${{ github.event.repository.name }}|" electron-builder.yml
          echo "Updated publish config:"
          grep -A4 "^publish:" electron-builder.yml

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Build & publish Windows installer
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win --x64 --publish always

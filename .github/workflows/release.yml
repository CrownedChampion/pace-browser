name: Build & Release Pace Browser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect project root
        id: findroot
        shell: bash
        run: |
          echo "Searching for package.json..."
          ROOT=$(git rev-parse --show-toplevel)
          echo "root=$ROOT" >> $GITHUB_OUTPUT
          echo "Project root detected at: $ROOT"

      - name: Debug folder structure
        run: ls -R "${{ steps.findroot.outputs.root }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Derive version from tag
        working-directory: ${{ steps.findroot.outputs.root }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing version $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Patch electron-builder publish config
        working-directory: ${{ steps.findroot.outputs.root }}
        shell: bash
        run: |
          sed -i "s|owner: .*|owner: ${{ github.repository_owner }}|" electron-builder.yml
          sed -i "s|repo: .*|repo: ${{ github.event.repository.name }}|" electron-builder.yml
          echo "Updated publish config:"
          grep -A4 "^publish:" electron-builder.yml

      - name: Install dependencies
        working-directory: ${{ steps.findroot.outputs.root }}
        run: npm install

      - name: Build & publish Windows installer
        working-directory: ${{ steps.findroot.outputs.root }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win --x64 --publish always

# Generated by Ziplo — do not edit manually
# This file is overwritten on every Ziplo upload
name: ziplo-build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node 22
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Package
        run: npm run pack

      - name: Verify build output
        run: dir dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: |
            dist\*.exe
            dist\*.msi
          fail_on_unmatched_files: false

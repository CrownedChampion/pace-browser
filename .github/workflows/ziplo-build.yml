# Generated by Ziplo — do not edit manually
# This file is overwritten on every Ziplo upload
name: ziplo-build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write


jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node 22
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build and publish release
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

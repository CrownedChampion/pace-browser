appId: com.that1dev.pacebrowser
productName: Pace Browser
copyright: "Copyright © 2026 That1Dev. All rights reserved."

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - "!src/**/*.map"

# Open web files with Pace (double-click .html/.htm → Pace)
fileAssociations:
  - ext: html
    name: HTML Document
    description: HTML Document
    role: Viewer
    icon: src/assets/icons/icon.ico
  - ext: htm
    name: HTML Document
    description: HTML Document
    role: Viewer
    icon: src/assets/icons/icon.ico
  - ext: xhtml
    name: XHTML Document
    role: Viewer
    icon: src/assets/icons/icon.ico
  - ext: svg
    name: SVG Image
    role: Viewer
    icon: src/assets/icons/icon.ico

win:
  icon: src/assets/icons/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker
  verifyUpdateCodeSignature: false

nsis:
  artifactName: Pace-Browser-Setup.${ext}
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Pace Browser
  deleteAppDataOnUninstall: false
  license: docs/LICENSE.txt
  include: installer/installer.nsh

# Auto-update feed. electron-updater reads the latest release from this repo.
# IMPORTANT: set `owner` to your GitHub username (repo name can stay if you name it pace-browser).
publish:
  provider: github
  owner: CrownedChampion
  repo: pace-browser
  releaseType: release

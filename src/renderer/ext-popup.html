<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Extensions Popup</title>
<style>
:root{--acc:#5b8ef0;--acc2:#a78bfa;--bg:#13131e;--card:#1a1a28;--hover:#22223a;--border:rgba(255,255,255,.07);--t1:#eeeef8;--t2:#8888bb;--t3:#44445a;--font:-apple-system,'Segoe UI Variable','Inter',system-ui,sans-serif;--r-md:12px;--r-pill:999px;--ease:cubic-bezier(.22,.8,.32,1)}
body.light{--bg:#f0f2f8;--card:#fff;--hover:#dde0ee;--border:rgba(0,0,0,.08);--t1:#111128;--t2:#5555aa;--t3:#aaaacc}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--t1);font-family:var(--font);overflow:hidden}

.popup{width:320px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7)}

.popup-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.popup-title{font-size:13px;font-weight:700;color:var(--t1)}
.manage-link{font-size:11px;color:var(--acc);cursor:pointer;font-weight:600}
.manage-link:hover{text-decoration:underline}

.ext-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .12s}
.ext-row:last-child{border-bottom:none}
.ext-row:hover{background:var(--hover)}
.ext-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--card);flex-shrink:0}
.ext-info{flex:1;min-width:0}
.ext-name{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ext-status{font-size:10px;color:var(--t3);margin-top:1px}
.toggle{width:36px;height:20px;background:var(--hover);border-radius:var(--r-pill);position:relative;cursor:pointer;transition:background .25s;border:1.5px solid var(--border);flex-shrink:0}
.toggle.on{background:var(--acc);border-color:var(--acc)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:transform .25s var(--ease)}
.toggle.on::after{transform:translateX(16px)}

.footer{padding:10px 14px;display:flex;gap:8px}
.btn-full{flex:1;padding:8px;border-radius:var(--r-pill);text-align:center;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);border:none}
.btn-store{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.btn-store:hover{opacity:.9}
.btn-manage{background:var(--card);color:var(--t2);border:1px solid var(--border)}
.btn-manage:hover{background:var(--hover);color:var(--t1)}

.empty{padding:24px;text-align:center;color:var(--t3);font-size:12px}
</style>
</head>
<body>
<div class="popup" id="popup"></div>
<script>
let exts=[];
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function navigate(url){if(window.pace)window.pace.navigate(url);}

async function init(){
  if(window.pace){
    const s=await window.pace.getSettings();
    document.body.classList.toggle('light',s.theme==='light');
    exts=await window.pace.getExtensions()||[];
  }
  render();
}

function render(){
  const el=document.getElementById('popup');
  el.innerHTML=`
    <div class="popup-head">
      <span class="popup-title">Extensions (${exts.length})</span>
      <span class="manage-link" onclick="navigate('pace://extensions')">Manage →</span>
    </div>
    ${exts.length
      ?exts.map((ext,i)=>`
        <div class="ext-row">
          <div class="ext-ico">${ext.icon||'🧩'}</div>
          <div class="ext-info">
            <div class="ext-name">${esc(ext.name)}</div>
            <div class="ext-status">${ext.enabled?'Active':'Disabled'}</div>
          </div>
          <div class="toggle${ext.enabled?' on':''}" onclick="toggle(${i},this)"></div>
        </div>`).join('')
      :'<div class="empty">No extensions installed yet</div>'
    }
    <div class="footer">
      <button class="btn-full btn-store" onclick="navigate('pace://extensions')">Browse Extensions</button>
      <button class="btn-full btn-manage" onclick="navigate('pace://extensions')">Manage</button>
    </div>
  `;
}

async function toggle(i,el){
  const ext=exts[i]; const next=!ext.enabled;
  if(window.pace){
    const r=await window.pace.setExtensionEnabled(ext.id||ext.path,next);
    if(!(r&&r.ok)){ return; }
  }
  ext.enabled=next;
  el.classList.toggle('on',next);
  const row=el.closest('.ext-row'); const st=row&&row.querySelector('.ext-status');
  if(st)st.textContent=next?'Active':'Disabled';
}

init();
</script>
</body>
</html>

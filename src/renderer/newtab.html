<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Tab — Pace</title>
<style>
:root{
  --acc:#5b8ef0;--acc2:#a78bfa;--glow:rgba(91,142,240,.22);
  --bg:#0a0a12;
  --glass:rgba(28,29,46,.5);--glass-2:rgba(40,42,66,.6);
  --glass-hi:rgba(255,255,255,.09);--border:rgba(255,255,255,.08);
  --hover:rgba(255,255,255,.08);
  --t1:#f1f1fb;--t2:#9d9dc8;--t3:#5c5c7e;
  --font:'Segoe UI Variable','Segoe UI',-apple-system,'Inter',system-ui,sans-serif;
  --r-md:14px;--r-lg:20px;--r-pill:999px;--ease:cubic-bezier(.22,.8,.32,1);
  --blur:30px;--sat:170%;
}
body.light{--bg:#eef1fb;--glass:rgba(255,255,255,.6);--glass-2:rgba(255,255,255,.72);--glass-hi:rgba(255,255,255,.85);--border:rgba(20,24,60,.1);--hover:rgba(20,24,60,.06);--t1:#13132b;--t2:#4f5388;--t3:#9a9ec4}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--t1);font-family:var(--font);overflow-x:hidden;transition:background .25s;scrollbar-width:none}
body::-webkit-scrollbar,html::-webkit-scrollbar{display:none}
#ambient{position:fixed;inset:0;overflow:hidden;pointer-events:none}
#ambient::before,#ambient::after{content:'';position:absolute;border-radius:50%;filter:blur(80px);opacity:.5}
#ambient::before{width:50vw;height:50vw;left:-8vw;top:-14vw;background:radial-gradient(circle at 30% 30%,var(--acc),transparent 70%);animation:f1 24s var(--ease) infinite alternate}
#ambient::after{width:46vw;height:46vw;right:-10vw;bottom:-12vw;background:radial-gradient(circle at 60% 40%,var(--acc2),transparent 70%);animation:f2 28s var(--ease) infinite alternate}
@keyframes f1{to{transform:translate(6vw,8vh) scale(1.12)}}
@keyframes f2{to{transform:translate(-5vw,-6vh) scale(1.1)}}
#wallpaper{position:fixed;inset:0;background-size:cover;background-position:center;opacity:.5;pointer-events:none}
.page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:54px 24px 40px}
.logo-wrap{display:flex;align-items:center;gap:11px;margin-bottom:6px;animation:li .6s var(--ease)}
@keyframes li{from{opacity:0;transform:scale(.85) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
.logo-svg{width:46px;height:46px}
.logo-txt{font-size:42px;font-weight:900;letter-spacing:-.04em;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{font-size:11px;color:var(--t3);letter-spacing:.13em;text-transform:uppercase;font-weight:500;margin-bottom:36px;animation:fu .6s .1s var(--ease) both}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.search-wrap{position:relative;width:100%;max-width:560px;margin-bottom:10px;animation:fu .6s .14s var(--ease) both}
.search-input{
  width:100%;height:52px;border-radius:var(--r-pill);color:var(--t1);font-family:var(--font);font-size:15px;
  padding:0 58px 0 50px;outline:none;caret-color:var(--acc);
  background:var(--glass-2);-webkit-backdrop-filter:blur(var(--blur)) saturate(var(--sat));backdrop-filter:blur(var(--blur)) saturate(var(--sat));
  border:1.5px solid var(--border);box-shadow:inset 0 1px 0 var(--glass-hi),0 12px 40px rgba(0,0,0,.3);
  transition:border-color .2s,box-shadow .2s;
}
.search-input:focus{border-color:var(--acc);box-shadow:inset 0 1px 0 var(--glass-hi),0 0 0 3px var(--glow),0 12px 40px rgba(0,0,0,.3)}
.search-icon{position:absolute;left:19px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;font-size:16px}
.search-go{position:absolute;right:8px;top:50%;transform:translateY(-50%);height:38px;padding:0 18px;border-radius:var(--r-pill);background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);transition:opacity .15s}
.search-go:hover{opacity:.9}
.eng-row{display:flex;gap:5px;margin-bottom:32px;animation:fu .6s .17s var(--ease) both;flex-wrap:wrap;justify-content:center}
.eng-btn{padding:5px 13px;border-radius:var(--r-pill);border:1.5px solid var(--border);background:var(--glass);color:var(--t2);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.eng-btn:hover{border-color:var(--acc);color:var(--acc)}
.eng-btn.active{border-color:var(--acc);background:var(--glow);color:var(--acc)}
.sec-label{width:100%;max-width:720px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:11px;display:flex;justify-content:space-between;align-items:center;animation:fu .6s .2s var(--ease) both}
.sec-edit{font-size:9px;color:var(--acc);cursor:pointer;font-weight:700;letter-spacing:.04em;text-transform:none}
.sec-edit:hover{text-decoration:underline}
.quick-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;width:100%;max-width:720px;margin-bottom:30px;animation:fu .6s .22s var(--ease) both}
.quick-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;padding:15px 6px;border-radius:var(--r-md);cursor:pointer;
  background:var(--glass);-webkit-backdrop-filter:blur(var(--blur)) saturate(var(--sat));backdrop-filter:blur(var(--blur)) saturate(var(--sat));
  border:1px solid var(--border);box-shadow:inset 0 1px 0 var(--glass-hi);transition:all .2s var(--ease)}
.quick-item:hover{background:var(--glass-2);transform:translateY(-3px);box-shadow:inset 0 1px 0 var(--glass-hi),0 12px 30px rgba(0,0,0,.3)}
.quick-ico{font-size:23px;line-height:1}.quick-img{width:26px;height:26px;border-radius:7px;object-fit:cover}.quick-nm{font-size:9px;color:var(--t2);font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.quick-rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#ff5560;color:#fff;border:none;cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.4)}
.quick-grid.editing .quick-rm{display:flex}
.quick-grid.editing .quick-item{animation:wob .3s var(--ease) infinite alternate}
@keyframes wob{from{transform:rotate(-1deg)}to{transform:rotate(1deg)}}
.quick-add{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:15px 6px;border-radius:var(--r-md);cursor:pointer;border:1.5px dashed var(--t3);color:var(--t3);transition:all .2s}
.quick-add:hover{border-color:var(--acc);color:var(--acc)}
.widgets{display:grid;grid-template-columns:1fr 1.5fr;gap:13px;width:100%;max-width:720px;margin-bottom:28px;animation:fu .6s .26s var(--ease) both}
.widget{border-radius:var(--r-lg);padding:18px;
  background:var(--glass);-webkit-backdrop-filter:blur(var(--blur)) saturate(var(--sat));backdrop-filter:blur(var(--blur)) saturate(var(--sat));
  border:1px solid var(--border);box-shadow:inset 0 1px 0 var(--glass-hi)}
.clock-time{font-size:40px;font-weight:200;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.clock-date{font-size:11px;color:var(--t2);margin-top:5px}
#mini-cal{margin-top:16px;border-top:1px solid var(--border);padding-top:12px}
.cal-head{font-size:11px;font-weight:700;color:var(--t2);text-align:center;margin-bottom:8px;letter-spacing:.03em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:8px;font-weight:700;color:var(--t3);text-align:center;padding:2px 0}
.cal-day{font-size:10px;color:var(--t2);text-align:center;padding:4px 0;border-radius:6px}
.cal-day.today{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:700}
.cal-day.empty{visibility:hidden}
.sports-widget{padding:15px 17px}
.sports-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:11px;display:flex;justify-content:space-between;align-items:center}
.sports-actions{display:flex;gap:10px;align-items:center}
.sports-link{font-size:9px;color:var(--acc);cursor:pointer;font-weight:600}
.sports-link:hover{text-decoration:underline}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.score-row:last-child{border-bottom:none}
.score-teams{flex:1;min-width:0}
.score-game{font-size:11px;font-weight:600;color:var(--t1)}
.score-league{font-size:9px;color:var(--t3);margin-top:1px}
.score-result{font-size:13px;font-weight:700;color:var(--acc);text-align:right;flex-shrink:0}
.score-live{font-size:8px;font-weight:800;letter-spacing:.06em;padding:1px 5px;border-radius:var(--r-pill);background:rgba(255,60,60,.15);border:1px solid rgba(255,60,60,.3);color:#ff5560;margin-left:5px;animation:lp 1.5s ease-in-out infinite;vertical-align:middle}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.4}}
.score-final{font-size:8px;color:var(--t3);text-align:right;margin-top:1px}
.sports-empty{text-align:center;padding:18px;font-size:11px;color:var(--t3)}
.sports-config{margin-top:4px}
.lg-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.lg-chip{padding:4px 11px;border-radius:var(--r-pill);border:1.5px solid var(--border);background:transparent;color:var(--t2);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.lg-chip.on{border-color:var(--acc);background:var(--glow);color:var(--acc)}
.teams-inp{width:100%;background:var(--glass);border:1.5px solid var(--border);color:var(--t1);font-family:var(--font);font-size:11px;padding:7px 11px;border-radius:var(--r-md);outline:none;margin-bottom:8px}
.teams-inp:focus{border-color:var(--acc)}
.cfg-hint{font-size:9px;color:var(--t3);margin-bottom:8px}
.cfg-done{padding:6px 14px;border-radius:var(--r-pill);background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:10px;font-weight:700;border:none;cursor:pointer;font-family:var(--font)}

/* add-link modal */
.modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.modal.show{display:flex}
.modal-card{width:340px;max-width:90vw;padding:24px;border-radius:var(--r-lg);background:var(--glass-2);-webkit-backdrop-filter:blur(40px) saturate(var(--sat));backdrop-filter:blur(40px) saturate(var(--sat));border:1px solid var(--border);box-shadow:inset 0 1px 0 var(--glass-hi),0 30px 70px rgba(0,0,0,.5)}
.modal-h{font-size:15px;font-weight:700;margin-bottom:16px}
.mrow{display:flex;gap:8px;margin-bottom:10px}
.minp{flex:1;background:var(--glass);border:1.5px solid var(--border);color:var(--t1);font-family:var(--font);font-size:13px;padding:9px 12px;border-radius:var(--r-md);outline:none}
.minp:focus{border-color:var(--acc)}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.mbtn{padding:8px 18px;border-radius:var(--r-pill);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);border:none}
.mbtn.ghost{background:transparent;border:1.5px solid var(--border);color:var(--t2)}
.mbtn.prim{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
</style>
</head>
<body>
<div id="ambient"></div>
<div id="wallpaper"></div>
<div class="page">
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 48 48" fill="none">
      <line x1="2" y1="16" x2="11" y2="16" stroke="var(--acc)" stroke-width="2.4" stroke-linecap="round" opacity=".9"/>
      <line x1="2" y1="24" x2="8" y2="24" stroke="var(--acc)" stroke-width="2.4" stroke-linecap="round" opacity=".6"/>
      <line x1="2" y1="32" x2="11" y2="32" stroke="var(--acc)" stroke-width="2.4" stroke-linecap="round" opacity=".35"/>
      <path d="M14 10v28M14 10h10a7 7 0 0 1 0 14H14" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <defs><linearGradient id="g1" x1="14" y1="10" x2="31" y2="38" gradientUnits="userSpaceOnUse"><stop stop-color="#5b8ef0"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs>
    </svg>
    <div class="logo-txt">Pace</div>
  </div>
  <div class="tagline">Browse with extreme speed</div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" type="text" placeholder="Search or enter address…" autofocus autocomplete="off" spellcheck="false">
    <button class="search-go" onclick="doSearch()">Go</button>
  </div>

  <div class="eng-row" id="eng-row"></div>

  <div class="sec-label">Quick Access <span class="sec-edit" id="qa-edit" onclick="toggleEdit()">Customize</span></div>
  <div class="quick-grid" id="quick-grid"></div>

  <div class="widgets" id="widgets">
    <div class="widget">
      <div class="clock-time" id="clock">00:00:00</div>
      <div class="clock-date" id="clock-date"></div>
      <div id="mini-cal"></div>
    </div>
    <div class="widget sports-widget" id="sports-widget">
      <div class="sports-title">
        🏆 Live Scores
        <div class="sports-actions">
          <span class="sports-link" id="sports-cfg-btn" onclick="toggleSportsCfg()">Edit</span>
          <span class="sports-link" onclick="fetchScores()">↻</span>
        </div>
      </div>
      <div id="scores-list"><div class="sports-empty">Loading scores…</div></div>
      <div class="sports-config" id="sports-config" style="display:none"></div>
    </div>
  </div>
</div>

<!-- add quick link modal -->
<div class="modal" id="add-modal">
  <div class="modal-card">
    <div class="modal-h">Add Quick Link</div>
    <div class="mrow"><input class="minp" id="ql-emoji" placeholder="🌐" style="flex:0 0 56px;text-align:center"><input class="minp" id="ql-name" placeholder="Name"></div>
    <div class="mrow"><input class="minp" id="ql-url" placeholder="example.com"></div>
    <div class="mact"><button class="mbtn ghost" onclick="closeAdd()">Cancel</button><button class="mbtn prim" onclick="saveQuickLink()">Add</button></div>
  </div>
</div>

<script>
const ENGINES={google:'Google',bing:'Bing',duckduckgo:'DuckDuckGo',brave:'Brave',ecosia:'Ecosia',startpage:'Startpage'};
const LEAGUES=[
  {id:'nfl',name:'NFL',emoji:'🏈',espn:'football/nfl'},
  {id:'nba',name:'NBA',emoji:'🏀',espn:'basketball/nba'},
  {id:'nhl',name:'NHL',emoji:'🏒',espn:'hockey/nhl'},
  {id:'mlb',name:'MLB',emoji:'⚾',espn:'baseball/mlb'},
  {id:'ncaaf',name:'CFB',emoji:'🏈',espn:'football/college-football'},
  {id:'ncaab',name:'CBB',emoji:'🏀',espn:'basketball/mens-college-basketball'},
  {id:'epl',name:'Premier League',emoji:'⚽',espn:'soccer/eng.1'},
  {id:'mls',name:'MLS',emoji:'⚽',espn:'soccer/usa.1'},
  {id:'laliga',name:'La Liga',emoji:'⚽',espn:'soccer/esp.1'},
  {id:'ucl',name:'Champions Lg',emoji:'⚽',espn:'soccer/uefa.champions'},
];
const DEFAULT_QUICK=[
  {n:'Google',i:'🔍',u:'google.com'},{n:'YouTube',i:'▶️',u:'youtube.com'},
  {n:'GitHub',i:'🐙',u:'github.com'},{n:'Reddit',i:'🧡',u:'reddit.com'},
  {n:'X',i:'✖️',u:'x.com'},{n:'Netflix',i:'🎬',u:'netflix.com'},
  {n:'Wikipedia',i:'📖',u:'wikipedia.org'},{n:'Discord',i:'💬',u:'discord.com'},
];
let settings={fastMode:true,searchEngine:'google',quickLinks:DEFAULT_QUICK.slice(),sportsLeagues:['nfl','nba'],sportsTeams:[],showSportsWidget:true,showClockWidget:true};
let editing=false, cfgOpen=false;
let hoverTimer=null; const warmed=new Set();

async function init(){
  if(window.pace){
    settings=await window.pace.getSettings();
    applyAppearance(settings);
    if(window.pace.on)window.pace.on('settings-changed',s=>{ settings={...settings,...s}; if(cfgOpen)return; applyAppearance(settings); renderEngines(); renderQuick(); applyWidgetVisibility(); maybeFetchScores(true); });
  }
  if(!settings.quickLinks||!settings.quickLinks.length) settings.quickLinks=DEFAULT_QUICK.slice();
  if(!settings.sportsLeagues) settings.sportsLeagues=['nfl','nba'];
  renderEngines(); renderQuick();
  applyWidgetVisibility();
  updateClock(); setInterval(updateClock,1000);
  renderCalendar();
  if(settings.showSportsWidget!==false) maybeFetchScores(true);
}
let lastScoreFetch=0;
function maybeFetchScores(force){
  if(settings.showSportsWidget===false)return;
  if(document.hidden)return;                       // never load in the background (saves data)
  const now=Date.now();
  if(!force && now-lastScoreFetch<30000)return;    // at most once per 30s, only while visible
  lastScoreFetch=now;
  fetchScores();
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ updateClock(); maybeFetchScores(); } });
window.addEventListener('focus',()=>{ updateClock(); maybeFetchScores(); });
function applyAppearance(s){
  document.body.classList.toggle('light',s.theme==='light');
  document.body.classList.toggle('no-anim',s.animations===false);
  const r=document.documentElement.style;
  if(s.accentColor){ r.setProperty('--acc',s.accentColor); r.setProperty('--glow',hexA(s.accentColor,.22)); }
  if(s.accentColor2) r.setProperty('--acc2',s.accentColor2);
  document.getElementById('wallpaper').style.backgroundImage=s.wallpaper?('url("'+s.wallpaper+'")'):'';
}
function hexA(hex,a){ const m=hex.replace('#',''); const n=m.length===3?m.split('').map(c=>c+c).join(''):m; return 'rgba('+parseInt(n.slice(0,2),16)+','+parseInt(n.slice(2,4),16)+','+parseInt(n.slice(4,6),16)+','+a+')'; }
function save(){ if(window.pace)window.pace.saveSettings(settings); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function renderEngines(){
  document.getElementById('eng-row').innerHTML=Object.keys(ENGINES).map(k=>'<button class="eng-btn'+((settings.searchEngine||'google')===k?' active':'')+'" onclick="setEngine(\''+k+'\')">'+ENGINES[k]+'</button>').join('');
}
function setEngine(k){ settings.searchEngine=k; save(); renderEngines(); }

const ntFavCache={};
function qDomain(u){ try{ if(!/^https?:\/\//.test(u))u='https://'+u; return new URL(u).hostname; }catch(e){ return ''; } }
const GLOBE_SVG='<svg class="quick-img" viewBox="0 0 24 24" fill="none" style="padding:2px"><circle cx="12" cy="12" r="9.2" stroke="var(--t2)" stroke-width="1.6"/><path d="M2.8 12h18.4M12 2.8c2.6 2.4 4 5.6 4 9.2s-1.4 6.8-4 9.2c-2.6-2.4-4-5.6-4-9.2s1.4-6.8 4-9.2Z" stroke="var(--t2)" stroke-width="1.4"/></svg>';
function qIcon(s){ const d=qDomain(s.u); return '<span class="quick-ico nt-ficon" data-favd="'+esc(d)+'">'+GLOBE_SVG+'</span>'; }
async function hydrateQuick(){
  if(!window.pace||!window.pace.getFavicon)return;
  for(const sp of document.querySelectorAll('.nt-ficon[data-favd]')){
    const d=sp.dataset.favd; if(!d)continue;
    try{ let data=ntFavCache[d]; if(data===undefined){ data=await window.pace.getFavicon(d); ntFavCache[d]=data||''; }
      if(data&&sp.parentNode){ const img=document.createElement('img'); img.className='quick-img'; img.src=data; sp.replaceWith(img); } }catch(e){}
  }
}
function renderQuick(){
  const grid=document.getElementById('quick-grid');
  grid.classList.toggle('editing',editing);
  grid.innerHTML=settings.quickLinks.map((s,i)=>'<div class="quick-item" data-u="'+esc(s.u)+'" onmouseenter="hoverPreload(this)" onmouseleave="cancelHover()" onclick="'+(editing?'':'nav(\''+esc(s.u)+'\')')+'"><button class="quick-rm" onclick="event.stopPropagation();removeQuick('+i+')">✕</button>'+qIcon(s)+'<span class="quick-nm">'+esc(s.n)+'</span></div>').join('')
    +(editing?'<div class="quick-add" onclick="openAdd()"><span class="quick-ico">＋</span><span class="quick-nm">Add</span></div>':'');
  hydrateQuick();
}
function toggleEdit(){ editing=!editing; document.getElementById('qa-edit').textContent=editing?'Done':'Customize'; renderQuick(); }
function removeQuick(i){ settings.quickLinks.splice(i,1); save(); renderQuick(); }
function openAdd(){ document.getElementById('add-modal').classList.add('show'); document.getElementById('ql-name').focus(); }
function closeAdd(){ document.getElementById('add-modal').classList.remove('show'); document.getElementById('ql-name').value='';document.getElementById('ql-url').value='';document.getElementById('ql-emoji').value=''; }
function saveQuickLink(){
  const n=document.getElementById('ql-name').value.trim();
  let u=document.getElementById('ql-url').value.trim();
  const i=document.getElementById('ql-emoji').value.trim()||'🌐';
  if(!n||!u)return;
  u=u.replace(/^https?:\/\//,'');
  settings.quickLinks.push({n:n,u:u,i:i}); save(); closeAdd(); renderQuick();
}

function applyWidgetVisibility(){
  document.getElementById('sports-widget').style.display=settings.showSportsWidget===false?'none':'';
  const widgets=document.getElementById('widgets');
  widgets.style.gridTemplateColumns=settings.showSportsWidget===false?'1fr':'1fr 1.5fr';
}

function nav(u){ if(window.pace)window.pace.navigate(u); }
function hoverPreload(el){
  if(editing||!window.pace||!el)return;
  const u=el.dataset.u; if(!u)return;
  clearTimeout(hoverTimer);
  hoverTimer=setTimeout(()=>{ if(warmed.has(u))return; warmed.add(u); window.pace.preloadUrl(u,{force:true}); },120);
}
function cancelHover(){ clearTimeout(hoverTimer); }
function doSearch(){ const v=document.getElementById('search').value.trim(); if(v&&window.pace)window.pace.navigate(v); }
document.getElementById('search').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

function updateClock(){
  const c=document.getElementById('clock'); if(!c)return;
  const n=new Date();
  let h=n.getHours(); const ampm=h>=12?'PM':'AM'; h=h%12; if(h===0)h=12;
  const m=String(n.getMinutes()).padStart(2,'0'); const s=String(n.getSeconds()).padStart(2,'0');
  c.innerHTML=h+':'+m+'<span style="font-size:.45em;font-weight:400">:'+s+' '+ampm+'</span>';
  const d=document.getElementById('clock-date'); if(d)d.textContent=n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function renderCalendar(){
  const el=document.getElementById('mini-cal'); if(!el)return;
  const now=new Date(); const y=now.getFullYear(), mo=now.getMonth(), today=now.getDate();
  const monthName=now.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const first=new Date(y,mo,1).getDay(); const days=new Date(y,mo+1,0).getDate();
  const dows=['S','M','T','W','T','F','S'];
  let html='<div class="cal-head">'+monthName+'</div><div class="cal-grid">';
  html+=dows.map(d=>'<div class="cal-dow">'+d+'</div>').join('');
  for(let i=0;i<first;i++)html+='<div class="cal-day empty"></div>';
  for(let dd=1;dd<=days;dd++)html+='<div class="cal-day'+(dd===today?' today':'')+'">'+dd+'</div>';
  html+='</div>';
  el.innerHTML=html;
}

// ── Sports config ──────────────────────────────────────────────────
function toggleSportsCfg(){
  cfgOpen=!cfgOpen;
  const box=document.getElementById('sports-config');
  document.getElementById('scores-list').style.display=cfgOpen?'none':'';
  box.style.display=cfgOpen?'block':'none';
  document.getElementById('sports-cfg-btn').textContent=cfgOpen?'Close':'Edit';
  if(cfgOpen)renderSportsCfg();
  else fetchScores();
}
function renderSportsCfg(){
  const box=document.getElementById('sports-config');
  box.innerHTML='<div class="cfg-hint">Pick leagues to follow</div><div class="lg-chips">'+
    LEAGUES.map(l=>'<button class="lg-chip'+(settings.sportsLeagues.includes(l.id)?' on':'')+'" data-id="'+l.id+'">'+l.emoji+' '+l.name+'</button>').join('')+
    '</div><div class="cfg-hint">Filter by team (optional, comma-separated abbreviations or names)</div>'+
    '<input class="teams-inp" id="teams-inp" placeholder="e.g. PHI, Lakers, Arsenal" value="'+esc((settings.sportsTeams||[]).join(', '))+'">'+
    '<button class="cfg-done" onclick="saveSportsCfg()">Save &amp; refresh</button>';
  box.querySelectorAll('.lg-chip').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));
}
function saveSportsCfg(){
  // Read the current selection straight from the panel so a save always reflects what's on screen
  const chosen=[].slice.call(document.querySelectorAll('#sports-config .lg-chip.on')).map(c=>c.dataset.id);
  settings.sportsLeagues=chosen;
  const raw=(document.getElementById('teams-inp').value||'').trim();
  settings.sportsTeams=raw?raw.split(',').map(s=>s.trim()).filter(Boolean):[];
  save();
  lastScoreFetch=0;
  toggleSportsCfg();
}

function fmtGameWhen(iso){
  if(!iso)return {full:'',dateShort:'',timeOnly:''};
  var d=new Date(iso); if(isNaN(d))return {full:'',dateShort:'',timeOnly:''};
  var now=new Date();
  var sameDay=d.toDateString()===now.toDateString();
  var dateShort=sameDay?'Today':d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  var timeOnly=d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  return {full:dateShort+' · '+timeOnly,dateShort:dateShort,timeOnly:timeOnly};
}

async function fetchScores(){
  if(cfgOpen)return;
  const el=document.getElementById('scores-list');
  const chosen=LEAGUES.filter(l=>settings.sportsLeagues.includes(l.id));
  if(!chosen.length){ el.innerHTML='<div class="sports-empty">No leagues selected.<br>Tap Edit to choose.</div>'; return; }
  el.innerHTML='<div class="sports-empty">Fetching live scores…</div>';
  const teams=(settings.sportsTeams||[]).map(t=>t.toLowerCase());
  const results=[];
  for(const league of chosen){
    try{
      const r=await fetch('https://site.api.espn.com/apis/site/v2/sports/'+league.espn+'/scoreboard',{signal:AbortSignal.timeout(4500)});
      if(!r.ok)continue;
      const data=await r.json();
      for(const ev of (data.events||[])){
        const comp=ev.competitions&&ev.competitions[0];
        if(!comp)continue;
        const cs=comp.competitors||[];
        const home=cs.find(t=>t.homeAway==='home'), away=cs.find(t=>t.homeAway==='away');
        if(!home||!away)continue;
        const st=ev.status&&ev.status.type;
        const homeNm=(home.team&&(home.team.abbreviation||home.team.name))||'?';
        const awayNm=(away.team&&(away.team.abbreviation||away.team.name))||'?';
        if(teams.length){
          const hay=(homeNm+' '+awayNm+' '+((home.team&&home.team.displayName)||'')+' '+((away.team&&away.team.displayName)||'')).toLowerCase();
          if(!teams.some(t=>hay.includes(t)))continue;
        }
        results.push({league:league.name,emoji:league.emoji,home:homeNm,away:awayNm,homeScore:home.score||'',awayScore:away.score||'',isLive:st&&st.state==='in',isFinal:st&&st.state==='post',clock:(ev.status&&ev.status.displayClock)||'',period:(ev.status&&ev.status.period)||'',date:ev.date||(comp&&comp.date)||''});
      }
    }catch(e){}
  }
  if(!results.length){ el.innerHTML='<div class="sports-empty">No games right now for your leagues.<br>Check back later!</div>'; return; }
  results.sort((a,b)=>(b.isLive?1:0)-(a.isLive?1:0));
  el.innerHTML=results.slice(0,6).map(g=>{
    var when=fmtGameWhen(g.date);
    var rightTop=(g.homeScore!==''||g.awayScore!=='')?'<div class="score-result">'+esc(g.awayScore)+' – '+esc(g.homeScore)+'</div>':'<div class="score-result" style="font-size:10px;color:var(--t3)">'+(when.timeOnly||'TBD')+'</div>';
    var rightSub=g.isFinal?'Final'+(when.dateShort?' · '+when.dateShort:''):g.isLive?'P'+esc(g.period||''):(when.dateShort||'');
    return '<div class="score-row"><div class="score-teams"><div class="score-game">'+esc(g.away)+' vs '+esc(g.home)+(g.isLive?'<span class="score-live">LIVE</span>':'')+'</div><div class="score-league">'+g.emoji+' '+esc(g.league)+(when.full&&!g.isLive?' · '+esc(when.full):'')+'</div></div><div>'+rightTop+'<div class="score-final">'+esc(rightSub)+'</div></div></div>';
  }).join('');
}

init();
</script>
